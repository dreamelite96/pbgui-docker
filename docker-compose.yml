# Services
services:

  # PBGui
  pbgui:
    build: .
    container_name: pbgui

    # ── Security ────────────────────────────────────────────────────────────
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - KILL
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    privileged: false
    read_only: false
    stdin_open: false
    tty: false

    # ── Resource limits ─────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8192M

    # ── Ports ───────────────────────────────────────────────────────────────
    ports:
      - mode: ingress
        protocol: tcp
        published: 8501
        target: 8501
      - mode: ingress
        protocol: tcp
        published: 8000
        target: 8000
    
    # ── Healthcheck ─────────────────────────────────────────────────────────
    healthcheck:
      test:
        - CMD
        - curl
        - '--request'
        - GET
        - '--silent'
        - '--output'
        - /dev/null
        - '--show-error'
        - '--fail'
        - http://127.0.0.1:8501/healthz
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
      start_interval: 5s

    # ── Restart policy ──────────────────────────────────────────────────────
    restart: unless-stopped

    # ── Volumes ─────────────────────────────────────────────────────────────
    volumes:
      # ── PBGui ── #
      # Persists bot list, session state, and UI settings managed through the
      # PBGui web interface across container restarts and image upgrades.
      - ./userdata/pbgui_data:/app/pbgui/data

      # Streamlit secrets file: holds the PBGui login password and any other
      # sensitive runtime configuration values read at application startup.
      - ./userdata/configs/secrets.toml:/app/pbgui/.streamlit/secrets.toml

      # ── Shared data ── #
      # Mounting historical market data and API keys from a single host path
      # ensures one source of truth for credentials and avoids redundant OHLCV
      # downloads if additional components are added to the stack in the future.
      - ./userdata/historical_data:/app/pb7/historical_data
      - ./userdata/api-keys.json:/app/pb7/api-keys.json

      # ── Passivbot v7 ── #
      # All persistent artefacts produced by PB7: live trading configs, backtest
      # result archives, optimisation outputs, and downloaded market-data caches.
      - ./userdata/pb7/configs:/app/pb7/configs
      - ./userdata/pb7/backtests:/app/pb7/backtests
      - ./userdata/pb7/optimize_results:/app/pb7/optimize_results
      - ./userdata/pb7/optimize_results_analysis:/app/pb7/optimize_results_analysis
      - ./userdata/pb7/caches:/app/pb7/caches

    # ── Network ─────────────────────────────────────────────────────────────
    networks:
      pbgui_net:

    # ── Labels ──────────────────────────────────────────────────────────────
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

# Volumes
volumes: {}

# Networks
networks:
  pbgui_net:
    name: pbgui-net
    driver: bridge