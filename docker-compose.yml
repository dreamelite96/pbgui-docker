# Services
services:

  # PBGui
  pbgui:
    build:
      context: .
      args:
        PBGUI_UID: ${PBGUI_UID:-1000}
        PBGUI_GID: ${PBGUI_GID:-1000}

    # Local image tag — useful for inspecting history and rolling back to a
    # previously built image without rebuilding from scratch.
    # The image is never pushed to a registry; it is build-only.
    image: ${PBGUI_IMAGE_NAME:-pbgui-docker}:${PBGUI_IMAGE_TAG:-latest}

    container_name: ${PBGUI_CONTAINER_NAME:-pbgui}

    # Run the container process as the same UID/GID used to build it.
    # This matches the host user that owns the bind-mounted volumes,
    # so files written inside the container are accessible on the host
    # without permission errors.
    user: "${PBGUI_UID:-1000}:${PBGUI_GID:-1000}"

    # ── Security ────────────────────────────────────────────────────────────
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    privileged: false
    read_only: false
    stdin_open: false
    tty: false

    # ── Resource limits ─────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: '${PBGUI_CPU_LIMIT:-4}'
          memory: ${PBGUI_MEMORY_LIMIT:-8192M}

    # ── Ports ───────────────────────────────────────────────────────────────
    # Host-side values are read from .env; internal container ports are fixed.
    ports:
      - "${PBGUI_WEBUI_PORT:-8501}:8501"
      - "${PBGUI_API_PORT:-8000}:8000"
    
    # ── Healthcheck ─────────────────────────────────────────────────────────
    # Always targets the fixed internal port (8501), regardless of the host
    # port configured above.
    healthcheck:
      test:
        - CMD
        - curl
        - '--request'
        - GET
        - '--silent'
        - '--output'
        - /dev/null
        - '--show-error'
        - '--fail'
        - http://127.0.0.1:8501/healthz
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
      start_interval: 5s

    # ── Restart policy ──────────────────────────────────────────────────────
    restart: unless-stopped

    # ── Volumes ─────────────────────────────────────────────────────────────
    volumes:
      # ── PBGui ── #
      # Persists bot list, session state, UI settings, logs, job queues,
      # SQLite database (PBData), PID files, coindata cache, and pbgui.ini.
      # pbgui.ini is stored here (data/pbgui.ini) and synced to the working
      # directory by entrypoint.sh at startup / on shutdown, so configparser's
      # atomic rename never hits a Docker mount point.
      - ./userdata/pbgui_data:/app/pbgui/data

      # .streamlit/: directory mount so Streamlit can write secrets.toml
      # atomically (rename pattern) without hitting [Errno 16] on a file mount.
      - ./userdata/streamlit:/app/pbgui/.streamlit

      # rclone/: directory mount for rclone cloud bucket credentials.
      # The user pbgui's HOME is /app, so rclone reads/writes
      # /app/.config/rclone/rclone.conf at runtime.
      # Mounted as a directory to allow atomic writes by rclone.
      - ./userdata/rclone:/app/.config/rclone

      # ── Shared data ── #
      # Mounting historical market data and API keys from a single host path
      # ensures one source of truth for credentials and avoids redundant OHLCV
      # downloads if additional components are added to the stack in the future.
      - ./userdata/historical_data:/app/pb7/historical_data
      - ./userdata/api-keys.json:/app/pb7/api-keys.json

      # ── Passivbot v7 ── #
      # All persistent artefacts produced by PB7: live trading configs, backtest
      # result archives, optimisation outputs, and downloaded market-data caches.
      - ./userdata/pb7/configs:/app/pb7/configs
      - ./userdata/pb7/backtests:/app/pb7/backtests
      - ./userdata/pb7/optimize_results:/app/pb7/optimize_results
      - ./userdata/pb7/optimize_results_analysis:/app/pb7/optimize_results_analysis
      - ./userdata/pb7/caches:/app/pb7/caches

    # ── Network ─────────────────────────────────────────────────────────────
    networks:
      pbgui_net:

    # ── Labels ──────────────────────────────────────────────────────────────
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

# Networks
networks:
  pbgui_net:
    name: pbgui-net
    driver: bridge
